<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Votación — VotaFácil</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <style>
        .form-container {
            max-width: 700px;
            margin: 2rem auto;
        }
        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .option-item {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            align-items: center;
        }
        .section-subtitle {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="/index.html" class="logo">VotaFácil</a>
            <ul class="nav-menu">
                <li><a href="/pages/rooms.html" class="nav-link">Salas</a></li>
                <li class="auth-required" style="display: none;"><a href="/pages/profile.html" class="nav-link">Mi Perfil</a></li>
                <li class="guest-only"><a href="/pages/login.html" class="btn btn-secondary">Iniciar Sesión</a></li>
                <li class="guest-only"><a href="/pages/register.html" class="btn btn-primary">Registrarse</a></li>
                <li class="auth-required" style="display: none;"><button onclick="handleLogout()" class="btn btn-secondary">Cerrar Sesión</button></li>
            </ul>
        </div>
    </header>

    <main>
        <div class="card form-container">
            <div style="margin-bottom: 2rem; text-align: center;">
                <h1 class="page-title">Crear Nueva Votación</h1>
                <p style="color: var(--text-secondary); font-size: 0.95rem;">Configura las preguntas, opciones y reglas para los participantes.</p>
            </div>

            <div id="alert-container"></div>

            <form id="poll-form">
                <!-- Informacion general -->
                <div class="form-group">
                    <label for="poll-title" class="form-label">Pregunta o Título de la Votación</label>
                    <input type="text" id="poll-title" class="form-control" placeholder="Ej. ¿Quién debería ser el presidente de la junta?" required minlength="5" maxlength="255">
                </div>

                <div class="form-group">
                    <label for="poll-desc" class="form-label">Descripción o Instrucciones (Opcional)</label>
                    <textarea id="poll-desc" class="form-control" placeholder="Instrucciones adicionales para los votantes" rows="3" maxlength="500"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="poll-type" class="form-label">Tipo de Votación</label>
                        <select id="poll-type" class="form-control" style="background-color: var(--bg-secondary); cursor: pointer;" required>
                            <option value="seleccion_unica" selected>Selección Única (Un voto, una respuesta)</option>
                            <option value="seleccion_multiple">Selección Múltiple (Un voto, varias respuestas)</option>
                            <option value="si_no">Sí / No</option>
                            <option value="calificacion">Calificación (Escala del 1 al 5)</option>
                        </select>
                    </div>

                    <div class="form-group" id="max-options-group" style="display: none;">
                        <label for="poll-max-opts" class="form-label">Max. Opciones por Usuario</label>
                        <input type="number" id="poll-max-opts" class="form-control" value="2" min="2" max="10">
                    </div>
                </div>

                <!-- Opciones de la votación (dinámico) -->
                <div id="options-section">
                    <h3 class="section-subtitle">Opciones de Respuesta</h3>
                    <div id="options-list">
                        <div class="option-item">
                            <input type="text" class="form-control poll-option-input" placeholder="Opción 1" required>
                            <button type="button" class="btn btn-danger remove-opt-btn" style="padding: 0.75rem;" disabled>Eliminar</button>
                        </div>
                        <div class="option-item">
                            <input type="text" class="form-control poll-option-input" placeholder="Opción 2" required>
                            <button type="button" class="btn btn-danger remove-opt-btn" style="padding: 0.75rem;" disabled>Eliminar</button>
                        </div>
                    </div>
                    <button type="button" id="add-opt-btn" class="btn btn-secondary" style="margin-top: 0.5rem; width: 100%;">Añadir Opción</button>
                </div>

                <!-- Configuración adicional -->
                <h3 class="section-subtitle">Configuración y Reglas</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label for="poll-visibility" class="form-label">Visibilidad de Votos</label>
                        <select id="poll-visibility" class="form-control" style="background-color: var(--bg-secondary); cursor: pointer;" required>
                            <option value="secreta" selected>Voto Secreto (Nadie ve quién votó por qué)</option>
                            <option value="publica">Voto Público (Se muestra la lista de votos detallada)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="poll-results-show" class="form-label">Mostrar Resultados</label>
                        <select id="poll-results-show" class="form-control" style="background-color: var(--bg-secondary); cursor: pointer;" required>
                            <option value="al_finalizar" selected>Al finalizar la votación (Cerrada)</option>
                            <option value="tiempo_real">En tiempo real (Durante la votación activa)</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="poll-max-participants" class="form-label">Límite de Participantes (Opcional)</label>
                        <input type="number" id="poll-max-participants" class="form-control" placeholder="Sin límite" min="1">
                    </div>

                    <div class="form-group">
                        <label for="poll-status" class="form-label">Estado Inicial</label>
                        <select id="poll-status" class="form-control" style="background-color: var(--bg-secondary); cursor: pointer;" required>
                            <option value="borrador">Borrador (Oculta para otros, no se puede votar)</option>
                            <option value="activa" selected>Activa (Pública para la sala, lista para votar)</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="poll-starts" class="form-label">Fecha de Inicio (Opcional)</label>
                        <input type="datetime-local" id="poll-starts" class="form-control">
                    </div>

                    <div class="form-group">
                        <label for="poll-ends" class="form-label">Fecha de Finalización (Opcional)</label>
                        <input type="datetime-local" id="poll-ends" class="form-control">
                    </div>
                </div>

                <div style="display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.5rem;">
                    <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
                        <input type="checkbox" id="poll-allow-change" style="width: 18px; height: 18px; cursor: pointer;">
                        <span>Permitir cambiar el voto al participante</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
                        <input type="checkbox" id="poll-auto-close" style="width: 18px; height: 18px; cursor: pointer;" checked>
                        <span>Cierre automático al alcanzar la fecha de finalización</span>
                    </label>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2.5rem;">
                    <a href="#" id="cancel-btn" class="btn btn-secondary" style="flex: 1; text-align: center;">Cancelar</a>
                    <button type="submit" class="btn btn-primary" style="flex: 2; padding: 0.75rem;" id="btn-submit">Crear Votación</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 VotaFácil. Todos los derechos reservados.</p>
    </footer>

    <script src="/assets/js/api.js?v=1"></script>
    <script src="/assets/js/poll-create.js?v=1"></script>
    <script>
        // Manejar navbar
        document.addEventListener('DOMContentLoaded', () => {
            if (!window.API.isAuthenticated()) {
                window.location.href = '/pages/login.html';
                return;
            }

            const guestElements = document.querySelectorAll('.guest-only');
            const authElements = document.querySelectorAll('.auth-required');
            guestElements.forEach(el => el.style.display = 'none');
            authElements.forEach(el => el.style.display = 'block');
        });

        async function handleLogout() {
            try {
                await window.API.post('/auth/logout');
            } catch (e) {}
            window.API.logoutLocal();
        }
    </script>
</body>
</html>
