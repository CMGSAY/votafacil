<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salas de Votación — VotaFácil</title>
    <meta name="description" content="Explora y participa en las salas públicas de votación disponibles en VotaFácil.">
    <link rel="stylesheet" href="/assets/css/global.css">
    <style>
        .rooms-header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .rooms-title {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .search-box {
            max-width: 350px;
        }
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 1.5rem;
        }
        .room-card {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .room-badge {
            align-self: flex-start;
            padding: 0.25rem 0.6rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            border-radius: 4px;
            margin-bottom: 1rem;
            border: 1px solid transparent;
        }
        .badge-publica {
            background-color: rgba(6, 182, 212, 0.1);
            border-color: rgba(6, 182, 212, 0.2);
            color: var(--secondary);
        }
        .badge-privada {
            background-color: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }
        .room-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .room-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }
        .room-meta {
            border-top: 1px solid var(--border-color);
            padding-top: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }
        .no-rooms {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="/index.html" class="logo">VotaFácil</a>
            <ul class="nav-menu">
                <li><a href="/pages/rooms.html" class="nav-link nav-active">Salas</a></li>
                <li class="auth-required" style="display: none;"><a href="/pages/profile.html" class="nav-link">Mi Perfil</a></li>
                <li class="guest-only"><a href="/pages/login.html" class="btn btn-secondary">Iniciar Sesión</a></li>
                <li class="guest-only"><a href="/pages/register.html" class="btn btn-primary">Registrarse</a></li>
                <li class="auth-required" style="display: none;"><button onclick="handleLogout()" class="btn btn-secondary">Cerrar Sesión</button></li>
            </ul>
        </div>
    </header>

    <main>
        <div class="rooms-header-actions">
            <div>
                <h1 class="rooms-title">Salas Públicas</h1>
                <p style="color: var(--text-secondary); margin-top: 0.25rem;">Explora salas y participa en sus votaciones activas.</p>
            </div>
            <div>
                <a href="/pages/room-create.html" class="btn btn-primary auth-required" style="display: none;">Crear Nueva Sala</a>
            </div>
        </div>

        <div class="card" style="padding: 1.5rem; margin-bottom: 2rem;">
            <div class="form-group" style="margin-bottom: 0;">
                <input type="text" id="search-input" class="form-control search-box" placeholder="Buscar salas por nombre...">
            </div>
        </div>

        <div id="alert-container"></div>

        <div class="rooms-grid" id="rooms-grid">
            <div class="no-rooms">Cargando salas disponibles...</div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 VotaFácil. Todos los derechos reservados.</p>
    </footer>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/rooms.js"></script>
    <script>
        // Manejar navbar
        document.addEventListener('DOMContentLoaded', () => {
            const isAuth = window.API.isAuthenticated();
            const guestElements = document.querySelectorAll('.guest-only');
            const authElements = document.querySelectorAll('.auth-required');

            if (isAuth) {
                guestElements.forEach(el => el.style.display = 'none');
                authElements.forEach(el => el.style.display = 'block');
            } else {
                guestElements.forEach(el => el.style.display = 'block');
                authElements.forEach(el => el.style.display = 'none');
            }
        });

        async function handleLogout() {
            try {
                await window.API.post('/auth/logout');
            } catch (e) {}
            window.API.logoutLocal();
        }
    </script>
</body>
</html>
