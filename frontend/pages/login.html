<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — VotaFácil</title>
    <meta name="description" content="Inicia sesión en tu cuenta de VotaFácil para participar en las votaciones.">
    <link rel="stylesheet" href="/assets/css/global.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 4rem auto;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            color: var(--secondary);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="/index.html" class="logo">VotaFácil</a>
            <ul class="nav-menu">
                <li><a href="/pages/rooms.html" class="nav-link">Salas</a></li>
                <li><a href="/pages/register.html" class="btn btn-primary">Registrarse</a></li>
            </ul>
        </div>
    </header>

    <main>
        <div class="card auth-container">
            <div class="auth-header">
                <h2 class="auth-title">Iniciar Sesión</h2>
                <p class="auth-subtitle">Ingresa tus credenciales para acceder a la plataforma.</p>
            </div>

            <div id="alert-container"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <input type="email" id="email" class="form-control" placeholder="Ej. juan@correo.com" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="Ingresa tu contraseña" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem;" id="btn-submit">Ingresar</button>
            </form>

            <div class="auth-footer">
                ¿No tienes una cuenta? <a href="/pages/register.html">Regístrate aquí</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 VotaFácil. Todos los derechos reservados.</p>
    </footer>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/login.js"></script>
</body>
</html>
