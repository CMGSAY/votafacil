<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrar Sala — VotaFácil</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 2rem auto;
        }
        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="/index.html" class="logo">VotaFácil</a>
            <ul class="nav-menu">
                <li><a href="/pages/rooms.html" class="nav-link">Salas</a></li>
                <li class="auth-required" style="display: none;"><a href="/pages/profile.html" class="nav-link">Mi Perfil</a></li>
                <li class="guest-only"><a href="/pages/login.html" class="btn btn-secondary">Iniciar Sesión</a></li>
                <li class="guest-only"><a href="/pages/register.html" class="btn btn-primary">Registrarse</a></li>
                <li class="auth-required" style="display: none;"><button onclick="handleLogout()" class="btn btn-secondary">Cerrar Sesión</button></li>
            </ul>
        </div>
    </header>

    <main>
        <div class="card form-container">
            <div style="margin-bottom: 2rem; text-align: center;">
                <h1 class="page-title" id="form-title">Crear Nueva Sala</h1>
                <p id="form-subtitle" style="color: var(--text-secondary); font-size: 0.95rem;">Completa los datos para configurar tu sala de votaciones.</p>
            </div>

            <div id="alert-container"></div>

            <form id="room-form">
                <div class="form-group">
                    <label for="room-name" class="form-label">Nombre de la Sala</label>
                    <input type="text" id="room-name" class="form-control" placeholder="Ej. Elecciones Consejo Estudiantil 2026" required minlength="3" maxlength="100">
                </div>
                
                <div class="form-group">
                    <label for="room-desc" class="form-label">Descripción</label>
                    <textarea id="room-desc" class="form-control" placeholder="Describe brevemente el propósito de esta sala" rows="4" maxlength="500"></textarea>
                </div>

                <div class="form-group">
                    <label for="room-image" class="form-label">URL de Imagen (Opcional)</label>
                    <input type="url" id="room-image" class="form-control" placeholder="https://ejemplo.com/imagen.jpg">
                </div>

                <div class="form-group">
                    <label for="room-type" class="form-label">Tipo de Sala</label>
                    <select id="room-type" class="form-control" style="background-color: var(--bg-secondary); cursor: pointer;" required>
                        <option value="publica" selected>Pública (Cualquier usuario puede verla y entrar)</option>
                        <option value="privada">Privada (Requiere código de acceso para entrar)</option>
                    </select>
                </div>

                <!-- Grupo de código de acceso dinámico (Fase 12.5) -->
                <div class="form-group" id="access-code-group" style="display: none;">
                    <label for="room-code" class="form-label">Código de Acceso Privado</label>
                    <input type="text" id="room-code" class="form-control" placeholder="Ingresa un código para los participantes" minlength="4" maxlength="20">
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <a href="/pages/rooms.html" class="btn btn-secondary" style="flex: 1; text-align: center;">Cancelar</a>
                    <button type="submit" class="btn btn-primary" style="flex: 2; padding: 0.75rem;" id="btn-submit">Crear Sala</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 VotaFácil. Todos los derechos reservados.</p>
    </footer>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/room-create.js"></script>
    <script>
        // Manejar navbar
        document.addEventListener('DOMContentLoaded', () => {
            if (!window.API.isAuthenticated()) {
                window.location.href = '/pages/login.html';
                return;
            }

            const guestElements = document.querySelectorAll('.guest-only');
            const authElements = document.querySelectorAll('.auth-required');
            guestElements.forEach(el => el.style.display = 'none');
            authElements.forEach(el => el.style.display = 'block');
        });

        async function handleLogout() {
            try {
                await window.API.post('/auth/logout');
            } catch (e) {}
            window.API.logoutLocal();
        }
    </script>
</body>
</html>
